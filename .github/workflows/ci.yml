# CI cho DigiAds Kit — lint (ruff) + test (pytest tests/)
# Ghi chú: thư mục test/ (legacy của base) cần Redis/proxy thật nên không chạy ở CI.
name: ci

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cài dependencies
        run: |
          python -m pip install --upgrade pip
          # Cài chung 1 lệnh: để pip giải ràng buộc fastapi/starlette cùng lúc
          # với anthropic/supabase/arq/mcp — cài 2 lệnh riêng đã từng khiến pip
          # âm thầm nâng starlette lên bản không tương thích fastapi==0.110.2.
          pip install -r requirements.txt anthropic supabase arq "mcp[cli]" ruff

      - name: Lint (ruff — phạm vi kit)
        run: ruff check .

      - name: Test (pytest tests/)
        run: pytest tests -q
